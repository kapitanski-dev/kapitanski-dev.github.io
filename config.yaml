# ============================================================
# KONFIGURACJA GAZETY „GRZYB TIMES”
# Ten plik edytujesz TY. Routine czyta go przy każdym wydaniu.
# Zmiana = commit do repo, nic więcej.
# ============================================================

wydanie:
  tytul: "Grzyb Times"
  jezyk: pl
  akapity: 5          # CEL i górna granica akapitów na artykuł; gdy materiału
                      # źródłowego jest za mało — daj mniej, nie dopychaj wodą

# ------------------------------------------------------------
# POGODA — pasek w nagłówku. Rutyna przy generowaniu parsuje
# aktualną pogodę ze strony Interii (prognoza_url; zero tokenów),
# a kliknięcie w temperaturę otwiera tę stronę. Gdy parsowanie
# zawiedzie, przeglądarka czytelnika użyje Open-Meteo (lat/lon).
# ------------------------------------------------------------
pogoda:
  miasto: "Nowy Dwór Mazowiecki"
  lat: 52.4306
  lon: 20.7158
  prognoza_url: "https://pogoda.interia.pl/prognoza-szczegolowa-nowy-dwor-mazowiecki,cId,23541"

# ------------------------------------------------------------
# TEMATY / KATEGORIE — kolejność ma znaczenie (pierwsza = okładka).
# `liczba` = ile artykułów w danej kategorii (od najważniejszego).
# Łączna liczba artykułów wydania = suma wszystkich `liczba`.
# Pierwsza kategoria „Okładka" (liczba: 1) = wielki artykuł otwierający
# wydanie, wybierany jako NAJWAŻNIEJSZA wiadomość dnia z dowolnego tematu.
# ------------------------------------------------------------
kategorie:
  - nazwa: Okładka
    liczba: 1
    zakres: "NAJWAŻNIEJSZA informacja dnia — dowolny temat (rynki, polityka, wojna, technologia, nauka); ta, która trafia na okładkę. Nie powielaj tej wiadomości w innych kategoriach."
    wykres: opcjonalny
  - nazwa: Inwestowanie
    liczba: 3
    zakres: "rynki, akcje, M&A, decyzje banków centralnych"
    wykres: preferowany
  - nazwa: Polityka
    liczba: 3
    zakres: "KONKRETNE decyzje z realnym skutkiem dla obywateli/gospodarki: uchwalone
      ustawy i regulacje, budżet, podatki, polityka zagraniczna, umowy i sankcje.
      NIE PISZ o: nominacjach i tym kto objął/został wybrany na jakie stanowisko;
      sondażach; partyjnych sporach, kłótniach i przepychankach. Liczy się MERYTORYKA
      i skutek, nie personalia i polityczne gierki."
    wykres: opcjonalny
  - nazwa: Wojna
    liczba: 3 
    zakres: "konflikty zbrojne, geopolityka, bezpieczeństwo"
    wykres: opcjonalny
  - nazwa: Technologia
    liczba: 2
    zakres: "NOWINKI techniczne i realny POSTĘP: nowe urządzenia i premiery,
      przełomy inżynieryjne i materiałowe, półprzewodniki, przemysł kosmiczny,
      cyberbezpieczeństwo, telekomunikacja, oprogramowanie.
      NIE PISZ o: AI, chipach AI i centrach danych (od tego jest osobna kategoria
      AI); pozwach, procesach, ugodach i sporach prawnych firm; sprawach
      antymonopolowych. Liczy się technika i postęp, nie sądy i korporacyjne
      przepychanki."
    wykres: opcjonalny
  - nazwa: AI
    liczba: 2
    zakres: "sztuczna inteligencja: nowe modele i możliwości, laboratoria AI
      (OpenAI, Anthropic, Google DeepMind, xAI, Meta), wdrożenia i produkty AI,
      regulacje AI, chipy i infrastruktura pod AI, humanoidy i robotyka"
    wykres: opcjonalny
  - nazwa: Nauka
    liczba: 2
    zakres: "twarde doniesienia naukowe: opublikowane badania i odkrycia (medycyna,
      fizyka, biologia, chemia, klimat, astronomia), przełomy badawcze. Konkrety:
      co odkryto, w jakim badaniu / czasopiśmie, co z tego wynika. NIE technologia
      konsumencka i NIE AI (osobne kategorie)."
    wykres: opcjonalny
  - nazwa: Ciekawostka na dziś
    liczba: 2
    zakres: "lekka ciekawostka na koniec — natura, historia, niezwykłe zjawiska,
      miejsca i rekordy. NIE poważne doniesienia badawcze (od nich jest kategoria
      Nauka) i NIE technologia."
    wykres: nie

# ------------------------------------------------------------
# ŹRÓDŁA PIERWOTNE — zamknięta lista. Każdy artykuł MUSI
# pochodzić z jednej z tych domen (link artykułu).
# ------------------------------------------------------------
# UWAGA: reuters.com USUNIĘTY — blokuje bota Claude-User w robots.txt (błąd 400
# „domain not accessible”), więc jest bezużyteczny. Jeśli w Logs zobaczysz ten sam
# błąd dla innej domeny — też ją stąd wyrzuć.
zrodla_pierwotne:
  - bloomberg.com
  - pap.pl
  - bankier.pl
  - money.pl
  - zero.pl/kategoria/swiat
  - aljazeera.com
  # Bliski Wschód / Iran — przeciwwaga dla narracji zachodniej:
  - amwaj.media        # specjalista Iran/Zatoka, źródła wewnątrz irańskiej polityki
  - middleeasteye.net  # reportaże z terenu, krytyczny wobec Izraela/Zachodu
  # Technologia:
  - theregister.com    # enterprise IT, sprzęt, security; jawnie zezwala botom Claude
  - spidersweb.pl      # polski serwis tech
  # AI:
  - the-decoder.com    # serwis wyłącznie o AI: modele, laboratoria, wdrożenia
  # Nauka + Ciekawostka na dziś:
  - sciencedaily.com
  - phys.org
  - sciencenews.org    # dziennikarstwo naukowe (Society for Science), bez paywalla
  - livescience.com    # codzienny popularnonaukowy; lżejsze tematy też pod Ciekawostkę
  # Uzupełnienie braków (audyt logów 19.07.2026):
  - finance.yahoo.com  # globalne rynki, działa też w weekendy (Inwestowanie);
                       # zastąpił marketwatch.com, który blokuje bota (błąd 400, audyt 20.07.2026)
  - interia.pl         # polskie newsy z konkretnymi URL-ami (Polityka)
  - newatlas.com       # nowinki techniczne i przełomy inżynieryjne (Technologia)
  - space.com          # przemysł kosmiczny — luka wykryta przy pominiętym Starship Flight 13

# ------------------------------------------------------------
# RESEARCH WTÓRNY — tryb WYJĄTKOWY, nie rutynowy. Poza listę
# źródeł wolno wyjść TYLKO gdy:
#  (a) w materiale brakuje naprawdę istotnej informacji, bez
#      której artykuł byłby niepełny lub mylący, albo
#  (b) informacje źródła wydają się nierzetelne/sprzeczne
#      i wymagają weryfikacji.
# NIE dla ozdobnego kontekstu, danych do wykresu ani wydłużania
# akapitów. Stały wyjątek: bieżący kurs walut do przeliczeń PLN.
# Źródło wtórne NIGDY nie jest linkiem artykułu (zrodlo.url), ale
# jeśli jego treść trafiła do akapitów — musi być wypisane
# w `zrodla_dodatkowe` przy artykule.
# ------------------------------------------------------------
research_wtorny:
  tryb: wyjatkowo   # nigdy | wyjatkowo | swobodnie
