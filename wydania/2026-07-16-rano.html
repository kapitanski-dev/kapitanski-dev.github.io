<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grzyb Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#faf7f0;--ink:#17150f;--ink-soft:#55503f;--rule:#d8d2c2;--accent:#8a1c1c;--card:#ffffff;--up:#1a7a3c;--down:#b02020;--chart-line:#8a1c1c;--chart-grid:#e4ddcd}
  html.dark{--paper:#14130f;--ink:#ece7da;--ink-soft:#a39d8b;--rule:#35322a;--accent:#e0655a;--card:#1d1b16;--up:#4cc57a;--down:#e0655a;--chart-line:#e0655a;--chart-grid:#2c2a23}
  *{box-sizing:border-box} html{scroll-behavior:smooth}
  body{font-family:'Newsreader',serif;background:var(--paper);color:var(--ink);margin:0;line-height:1.65;font-size:17px;transition:background .4s,color .4s}
  #progress{position:fixed;top:0;left:0;height:3px;width:0;background:var(--accent);z-index:100;transition:width .1s linear}
  .wrap{max-width:1100px;margin:0 auto;padding:0 24px}
  header.masthead{text-align:center;padding:40px 0 0}
  .masthead .kicker{font-family:'Inter',sans-serif;font-size:.7em;letter-spacing:4px;text-transform:uppercase;color:var(--ink-soft)}
  .masthead h1{font-family:'Fraunces',serif;font-variation-settings:"opsz" 144;font-weight:900;font-size:clamp(3em,9vw,5.5em);margin:8px 0 4px;letter-spacing:-1px;line-height:1}
  .date-bar{display:flex;justify-content:space-between;align-items:center;font-family:'Inter',sans-serif;font-size:.72em;text-transform:uppercase;letter-spacing:2px;font-weight:600;color:var(--ink-soft);border-top:1px solid var(--rule);border-bottom:3px double var(--ink);padding:10px 0;margin-top:22px}
  #theme-toggle{background:none;border:1px solid var(--rule);border-radius:20px;color:var(--ink-soft);font:inherit;cursor:pointer;padding:3px 12px;letter-spacing:2px}
  #theme-toggle:hover{color:var(--accent);border-color:var(--accent)}
  .ticker{overflow:hidden;white-space:nowrap;border-bottom:1px solid var(--rule);font-family:'Inter',sans-serif;font-size:.78em;font-weight:600;padding:9px 0}
  .ticker-track{display:inline-block;animation:ticker 40s linear infinite}
  .ticker:hover .ticker-track{animation-play-state:paused}
  .ticker-item{margin:0 28px}
  .ticker-item .chg.up{color:var(--up)} .ticker-item .chg.down{color:var(--down)}
  @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .hero{margin:44px 0 10px} .hero .cat-label{margin-bottom:14px}
  .hero figure{margin:0 0 22px;position:relative;overflow:hidden;border-radius:6px}
  .hero img{width:100%;height:420px;object-fit:cover;display:block;transform:scale(1.02);transition:transform 6s ease}
  .hero:hover img{transform:scale(1.08)}
  .hero h2{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(1.8em,4.5vw,2.9em);line-height:1.12;margin:0 0 10px;letter-spacing:-.5px}
  .hero h2 a,.article h3 a{color:var(--ink);text-decoration:none}
  .hero h2 a:hover,.article h3 a:hover{color:var(--accent)}
  .hero .cols{column-count:2;column-gap:40px;column-rule:1px solid var(--rule)}
  @media(max-width:768px){.hero .cols{column-count:1}.hero img{height:260px}}
  .cat-label{display:inline-flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;font-size:.68em;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--accent)}
  .cat-label::before{content:"";width:26px;height:2px;background:var(--accent)}
  .divider{border:none;border-top:3px double var(--ink);margin:48px 0 0}
  .article{display:grid;grid-template-columns:340px 1fr;gap:36px;padding:40px 0;border-bottom:1px solid var(--rule);align-items:start}
  .article:nth-child(even){grid-template-columns:1fr 340px}
  .article:nth-child(even) figure{order:2}
  .article figure{margin:0;overflow:hidden;border-radius:6px}
  .article img{width:100%;height:230px;object-fit:cover;display:block;filter:saturate(.85);transition:filter .5s,transform .5s}
  .article:hover img{filter:saturate(1.1);transform:scale(1.04)}
  .article h3{font-family:'Fraunces',serif;font-weight:700;font-size:1.7em;line-height:1.15;margin:10px 0 8px;letter-spacing:-.3px}
  .meta{font-family:'Inter',sans-serif;font-size:.7em;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:14px}
  .meta a{color:var(--ink-soft)}
  .article p,.hero p{margin:0 0 14px;text-align:justify;hyphens:auto}
  .lede::first-letter{float:left;font-family:'Fraunces',serif;font-weight:900;font-size:3.3em;line-height:.82;padding:4px 8px 0 0;color:var(--accent)}
  .stats{display:flex;gap:28px;flex-wrap:wrap;margin:4px 0 16px}
  .stat .num{font-family:'Fraunces',serif;font-weight:800;font-size:1.9em;line-height:1;color:var(--accent);display:block}
  .stat .lbl{font-family:'Inter',sans-serif;font-size:.68em;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft)}
  .chart-box{background:var(--card);border:1px solid var(--rule);border-radius:6px;padding:16px 18px 10px;margin:6px 0 16px}
  .chart-box .chart-title{font-family:'Inter',sans-serif;font-size:.72em;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-soft);margin-bottom:8px}
  .chart-box svg{width:100%;height:auto;display:block}
  .chart-box .axis-lbl{font-family:'Inter',sans-serif;font-size:10px;fill:var(--ink-soft)}
  .chart-box path.line{fill:none;stroke:var(--chart-line);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:2000;stroke-dashoffset:2000}
  .in-view .chart-box path.line{animation:draw 1.6s ease forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .chart-box path.area{fill:var(--chart-line);opacity:.08}
  .chart-box rect.bar{fill:var(--chart-line);transform-origin:bottom;transform:scaleY(0)}
  .in-view .chart-box rect.bar{animation:grow .8s ease forwards}
  @keyframes grow{to{transform:scaleY(1)}}
  .chart-box line.grid{stroke:var(--chart-grid);stroke-width:1}
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s,transform .7s}
  .reveal.in-view{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}.ticker-track{animation:none}}
  footer{margin:60px 0 40px;padding-top:18px;border-top:3px double var(--ink);font-family:'Inter',sans-serif;font-size:.72em;color:var(--ink-soft);text-align:center;letter-spacing:1px;text-transform:uppercase}
  @media(max-width:768px){.article,.article:nth-child(even){grid-template-columns:1fr}.article:nth-child(even) figure{order:0}.article img{height:200px}.date-bar{flex-wrap:wrap;gap:8px;justify-content:center}}
</style>
</head>

  <script>
  (function(){
    const D=JSON.parse(document.getElementById('dane-gazety').textContent);
    const root=document.documentElement;
    if(localStorage.getItem('gazeta-theme')==='dark'||(!localStorage.getItem('gazeta-theme')&&matchMedia('(prefers-color-scheme: dark)').matches))root.classList.add('dark');
    document.getElementById('theme-toggle').onclick=()=>{root.classList.toggle('dark');localStorage.setItem('gazeta-theme',root.classList.contains('dark')?'dark':'light')};
    const tytul=D.tytul||'Grzyb Times';
    document.title=tytul+' — '+D.data_wydania;
    document.getElementById('tytul-gazety').textContent=tytul;
    document.getElementById('data-wydania').textContent=D.data_wydania;
    document.getElementById('numer-wydania').textContent=D.numer||'Wydanie poranne';
    if(D.kicker)document.getElementById('kicker-label').textContent=D.kicker;
    if(D.ticker&&D.ticker.length){
      const t=document.getElementById('ticker');t.hidden=false;
      const html=D.ticker.map(i=>`<span class="ticker-item">${esc(i.nazwa)} ${esc(i.wartosc)} <span class="chg ${i.zmiana.trim().startsWith('-')?'down':'up'}">${esc(i.zmiana)}</span></span>`).join('');
      document.getElementById('ticker-track').innerHTML=html+html;
    }
    const main=document.getElementById('gazeta');
    const FB='data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500"><rect width="100%" height="100%" fill="%23d8d2c2"/><text x="50%" y="50%" font-family="serif" font-size="40" fill="%2355503f" text-anchor="middle">Grzyb Times</text></svg>');
    D.artykuly.forEach((a,i)=>{
      const el=document.createElement('article');
      el.className=(i===0?'hero':'article')+' reveal';
      const img=`<figure><a href="${esc(a.zrodlo.url)}"><img src="${esc(a.obraz&&a.obraz.url||'')}" alt="${esc(a.obraz&&a.obraz.alt||a.kategoria)}" loading="lazy" onerror="this.src='${FB}'"></a></figure>`;
      const stats=(a.kluczowe_liczby||[]).map(s=>`<span class="stat"><span class="num">${esc(s.wartosc)}</span><span class="lbl">${esc(s.opis)}</span></span>`).join('');
      const paras=a.akapity.map((p,j)=>`<p class="${j===0?'lede':''}">${esc(p)}</p>`).join('');
      const body=`<span class="cat-label">${esc(a.kategoria)}</span>`+`<h${i===0?2:3}><a href="${esc(a.zrodlo.url)}">${esc(a.tytul)}</a></h${i===0?2:3}>`+`<span class="meta">Źródło: <a href="${esc(a.zrodlo.url)}">${esc(a.zrodlo.nazwa)}</a>${a.zrodlo.godzina?' · '+esc(a.zrodlo.godzina):''}</span>`+(stats?`<div class="stats">${stats}</div>`:'')+( a.wykres?chart(a.wykres):'')+(i===0?`<div class="cols">${paras}</div>`:paras);
      el.innerHTML=i===0?img+body:img+`<div class="article-content">${body}</div>`;
      main.appendChild(el);
      if(i===0)main.appendChild(Object.assign(document.createElement('hr'),{className:'divider'}));
    });
    const zrodla=[...new Set(D.artykuly.map(a=>a.zrodlo.nazwa))].join(' · ');
    document.getElementById('stopka').textContent=`Źródła wydania: ${zrodla} — wygenerowano ${D.data_wydania}`;
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in-view');io.unobserve(e.target);}}),{threshold:.15});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    addEventListener('scroll',()=>{const h=document.documentElement;document.getElementById('progress').style.width=(h.scrollTop/(h.scrollHeight-h.clientHeight)*100)+'%';},{passive:true});
    function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function chart(w){
      const W=560,H=180,P={t:14,r:12,b:26,l:12};
      const vals=w.wartosci,n=vals.length;
      if(!n)return'';
      const min=Math.min(...vals),max=Math.max(...vals),span=(max-min)||1;
      const x=i=>P.l+i*(W-P.l-P.r)/Math.max(n-1,1);
      const y=v=>P.t+(1-(v-min)/span)*(H-P.t-P.b);
      let inner='';
      for(let g=0;g<=3;g++){const gy=P.t+g*(H-P.t-P.b)/3;inner+=`<line class="grid" x1="${P.l}" y1="${gy}" x2="${W-P.r}" y2="${gy}"/>`;}
      if(w.typ==='slupki'){const bw=(W-P.l-P.r)/n*.62;vals.forEach((v,i)=>{const bx=P.l+i*(W-P.l-P.r)/n+((W-P.l-P.r)/n-bw)/2;inner+=`<rect class="bar" x="${bx}" y="${y(v)}" width="${bw}" height="${H-P.b-y(v)}" rx="3" style="animation-delay:${i*70}ms"/>`;});}
      else{const pts=vals.map((v,i)=>`${x(i)},${y(v)}`).join(' L');inner+=`<path class="area" d="M${x(0)},${H-P.b} L${pts} L${x(n-1)},${H-P.b} Z"/>`;inner+=`<path class="line" d="M${pts}"/>`;}
      (w.etykiety||[]).forEach((lb,i)=>{const step=Math.ceil(n/8);if(i%step===0||i===n-1){const lx=w.typ==='slupki'?P.l+(i+.5)*(W-P.l-P.r)/n:x(i);inner+=`<text class="axis-lbl" x="${lx}" y="${H-8}" text-anchor="middle">${esc(lb)}</text>`;}});
      return`<div class="chart-box"><div class="chart-title">${esc(w.tytul||'')}</div><svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(w.tytul||'wykres')}">${inner}</svg></div>`;
    }
  })();
  </script>
</body>
</html>
