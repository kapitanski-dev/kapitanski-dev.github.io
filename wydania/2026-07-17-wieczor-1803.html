<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gazeta Codzienna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf7f0;
    --ink: #17150f;
    --ink-soft: #55503f;
    --rule: #d8d2c2;
    --accent: #8a1c1c;
    --card: #ffffff;
    --chart-line: #8a1c1c;
    --chart-grid: #e4ddcd;
  }
  html.dark {
    --paper: #14130f;
    --ink: #ece7da;
    --ink-soft: #a39d8b;
    --rule: #35322a;
    --accent: #e0655a;
    --card: #1d1b16;
    --chart-line: #e0655a;
    --chart-grid: #2c2a23;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Newsreader', serif;
    background: var(--paper);
    color: var(--ink);
    margin: 0;
    line-height: 1.65;
    font-size: 17px;
    transition: background .4s ease, color .4s ease;
  }

  /* ===== Pasek postępu czytania ===== */
  #progress {
    position: fixed; top: 0; left: 0; height: 3px; width: 0;
    background: var(--accent); z-index: 100;
    transition: width .1s linear;
  }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  /* ===== Nagłówek ===== */
  header.masthead {
    text-align: center;
    padding: 40px 0 0;
  }
  .masthead .kicker {
    font-family: 'Inter', sans-serif;
    font-size: .7em; letter-spacing: 4px; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 144;
    font-weight: 900;
    font-size: clamp(3em, 9vw, 5.5em);
    margin: 8px 0 4px;
    letter-spacing: -1px;
    line-height: 1;
  }
  .date-bar {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Inter', sans-serif;
    font-size: .72em; text-transform: uppercase; letter-spacing: 2px;
    font-weight: 600; color: var(--ink-soft);
    border-top: 1px solid var(--rule);
    border-bottom: 3px double var(--ink);
    padding: 10px 0; margin-top: 22px;
  }
  #theme-toggle {
    background: none; border: 1px solid var(--rule); border-radius: 20px;
    color: var(--ink-soft); font: inherit; cursor: pointer; padding: 3px 12px;
    letter-spacing: 2px;
  }
  #theme-toggle:hover { color: var(--accent); border-color: var(--accent); }

  /* ===== Artykuł hero ===== */
  .hero { margin: 40px 0 10px; }
  .hero .cat-label { margin-bottom: 14px; font-size: .78em; letter-spacing: 4px; }
  .hero .cat-label::before { width: 34px; }
  .hero figure { margin: 0 0 22px; position: relative; overflow: hidden; border-radius: 6px; }
  .hero img {
    width: 100%; height: clamp(340px, 46vh, 540px); object-fit: cover; display: block;
    transform: scale(1.02); transition: transform 6s ease;
  }
  .hero:hover img { transform: scale(1.08); }
  .hero h2 {
    font-family: 'Fraunces', serif; font-weight: 700;
    font-size: clamp(1.8em, 4.5vw, 2.9em);
    line-height: 1.12; margin: 0 0 10px; letter-spacing: -.5px;
  }
  .hero h2 a, .article h3 a { color: var(--ink); text-decoration: none; }
  .hero h2 a:hover, .article h3 a:hover { color: var(--accent); }
  .hero .cols { column-count: 2; column-gap: 40px; column-rule: 1px solid var(--rule); }
  /* hero mobile — pełna wersja poniżej */

  /* ===== Etykieta kategorii ===== */
  .cat-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Inter', sans-serif; font-size: .68em; font-weight: 700;
    text-transform: uppercase; letter-spacing: 3px; color: var(--accent);
  }
  .cat-label::before { content: ""; width: 26px; height: 2px; background: var(--accent); }

  /* ===== Filtry kategorii ===== */
  .filtry {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 8px;
  }
  .filtr {
    font-family: 'Inter', sans-serif; font-size: .7em; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px; padding: 6px 16px;
    border: 1px solid var(--rule); border-radius: 20px;
    background: transparent; color: var(--ink-soft); cursor: pointer;
    transition: all .2s;
  }
  .filtr:hover { border-color: var(--accent); color: var(--accent); }
  .filtr.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  article.hidden { display: none !important; }
  .divider.hidden { display: none !important; }

  /* ===== Pozostałe artykuły ===== */
  .divider {
    border: none; border-top: 3px double var(--ink);
    margin: 48px 0 0;
  }
  .article {
    display: grid; grid-template-columns: 340px 1fr; gap: 36px;
    padding: 40px 0; border-bottom: 1px solid var(--rule);
    align-items: start;
  }
  .article:nth-child(even) { grid-template-columns: 1fr 340px; }
  .article:nth-child(even) figure { order: 2; }
  .article figure { margin: 0; overflow: hidden; border-radius: 6px; }
  .article img {
    width: 100%; height: 230px; object-fit: cover; display: block;
    filter: saturate(.85); transition: filter .5s ease, transform .5s ease;
  }
  .article:hover img { filter: saturate(1.1); transform: scale(1.04); }
  .article h3 {
    font-family: 'Fraunces', serif; font-weight: 700;
    font-size: 1.7em; line-height: 1.15; margin: 10px 0 8px; letter-spacing: -.3px;
  }
  .meta {
    font-family: 'Inter', sans-serif; font-size: .7em; font-weight: 600;
    color: var(--ink-soft); text-transform: uppercase; letter-spacing: 1.5px;
    display: block; margin-bottom: 14px;
  }
  .meta a { color: var(--ink-soft); }
  .article p, .hero p { margin: 0 0 14px; text-align: justify; hyphens: auto; }
  .lede::first-letter {
    float: left; font-family: 'Fraunces', serif; font-weight: 900;
    font-size: 3.3em; line-height: .82; padding: 4px 8px 0 0; color: var(--accent);
  }

  /* ===== Kluczowe liczby ===== */
  .stats { display: flex; gap: 28px; flex-wrap: wrap; margin: 4px 0 16px; }
  .stat .num {
    font-family: 'Fraunces', serif; font-weight: 800; font-size: 1.9em;
    line-height: 1; color: var(--accent); display: block;
  }
  .stat .lbl {
    font-family: 'Inter', sans-serif; font-size: .68em; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px; color: var(--ink-soft);
  }

  /* ===== Wykresy ===== */
  .chart-box {
    background: var(--card); border: 1px solid var(--rule); border-radius: 6px;
    padding: 16px 18px 10px; margin: 6px 0 16px; position: relative;
  }
  .chart-box svg { cursor: crosshair; }
  .chart-box circle.pt { fill: var(--chart-line); opacity: 0; transition: opacity .4s ease; }
  .in-view .chart-box circle.pt { opacity: .85; }
  .chart-box circle.hl { fill: var(--card); stroke: var(--chart-line); stroke-width: 2.5; opacity: 0; pointer-events: none; }
  .chart-box line.guide { stroke: var(--chart-line); stroke-width: 1; stroke-dasharray: 3 3; opacity: 0; pointer-events: none; }
  .chart-box rect.hit { fill: transparent; }
  .chart-box .val-lbl { font-family: 'Inter', sans-serif; font-size: 9px; fill: var(--ink-soft); }
  .chart-box .chart-tip {
    position: absolute; pointer-events: none; opacity: 0; z-index: 5;
    transform: translate(-50%, -140%); background: var(--ink); color: var(--paper);
    font-family: 'Inter', sans-serif; font-size: .72em; font-weight: 600;
    padding: 4px 9px; border-radius: 5px; white-space: nowrap; transition: opacity .15s ease;
  }
  .chart-box .chart-tip b { font-weight: 800; }
  .chart-box .chart-title {
    font-family: 'Inter', sans-serif; font-size: .72em; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .chart-box svg { width: 100%; height: auto; display: block; }
  .chart-box .axis-lbl { font-family: 'Inter', sans-serif; font-size: 10px; fill: var(--ink-soft); }
  .chart-box path.line {
    fill: none; stroke: var(--chart-line); stroke-width: 2.5;
    stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: 2000; stroke-dashoffset: 2000;
  }
  .in-view .chart-box path.line { animation: draw 1.6s ease forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  .chart-box path.area { fill: var(--chart-line); opacity: .08; }
  .chart-box rect.bar { fill: var(--chart-line); transform-origin: bottom; transform: scaleY(0); }
  .in-view .chart-box rect.bar { animation: grow .8s ease forwards; }
  @keyframes grow { to { transform: scaleY(1); } }
  .chart-box line.grid { stroke: var(--chart-grid); stroke-width: 1; }

  /* ===== Animacja wejścia ===== */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .7s ease, transform .7s ease; }
  .reveal.in-view { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1; transform: none; transition: none; }
  }

  /* ===== Stopka ===== */
  footer {
    margin: 60px 0 40px; padding-top: 18px; border-top: 3px double var(--ink);
    font-family: 'Inter', sans-serif; font-size: .72em; color: var(--ink-soft);
    text-align: center; letter-spacing: 1px; text-transform: uppercase;
  }

  /* ===== MOBILE (tablet + telefon) ===== */
  @media (max-width: 768px) {
    body { font-size: 15px; }
    .wrap { padding: 0 16px; }
    header.masthead { padding: 24px 0 0; }
    .masthead h1 { letter-spacing: -2px; }
    .date-bar { flex-direction: column; align-items: center; gap: 6px; padding: 8px 0; font-size: .65em; }
    #theme-toggle { padding: 5px 14px; }

    /* Filtry — poziomy scroll zamiast zawijania */
    .filtry { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;
               padding: 14px 16px; margin: 0 -16px; scrollbar-width: none; border-bottom: none; }
    .filtry::-webkit-scrollbar { display: none; }
    .filtr { flex-shrink: 0; }

    /* Hero */
    .hero { margin: 28px 0 8px; }
    .hero figure { margin: 0 0 16px; border-radius: 4px; }
    .hero img { height: 220px; }
    .hero h2 { font-size: 1.6em; }
    .hero .cols { column-count: 1; }

    /* Separator */
    .divider { margin: 28px 0 0; }

    /* Pozostałe artykuły */
    .article, .article:nth-child(even) { grid-template-columns: 1fr; gap: 0; padding: 24px 0; }
    .article:nth-child(even) figure { order: 0; }
    .article figure { margin: 0 0 14px; border-radius: 4px; }
    .article img { height: 180px; }
    .article h3 { font-size: 1.35em; margin: 6px 0; }
    .lede::first-letter { font-size: 2.6em; }

    /* Statystyki */
    .stats { gap: 14px; margin: 2px 0 12px; }
    .stat .num { font-size: 1.5em; }

    /* Wykresy */
    .chart-box { padding: 12px 12px 8px; }
  }

  /* ===== TELEFON (small) ===== */
  @media (max-width: 480px) {
    .masthead h1 { font-size: 2.8em; }
    .hero img { height: 190px; }
    .hero h2 { font-size: 1.4em; }
    .article img { height: 160px; }
    .article h3 { font-size: 1.2em; }
  }
</style>
</head>

    <main id="gazeta"></main>
    <footer id="stopka"></footer>

  <script>
  (function () {
    const D = JSON.parse(document.getElementById('dane-gazety').textContent);

    /* ---- motyw ---- */
    const root = document.documentElement;
    if (localStorage.getItem('gazeta-theme') === 'dark' ||
        (!localStorage.getItem('gazeta-theme') && matchMedia('(prefers-color-scheme: dark)').matches)) {
      root.classList.add('dark');
    }
    document.getElementById('theme-toggle').onclick = () => {
      root.classList.toggle('dark');
      localStorage.setItem('gazeta-theme', root.classList.contains('dark') ? 'dark' : 'light');
    };

    /* ---- nagłówek ---- */
    const tytul = D.tytul || 'Gazeta Codzienna';
    document.title = tytul + ' — ' + D.data_wydania;
    document.getElementById('tytul-gazety').textContent = tytul;
    document.getElementById('data-wydania').textContent = D.data_wydania;
    document.getElementById('numer-wydania').textContent = D.numer || '';
    if (D.kicker) document.getElementById('kicker-label').textContent = D.kicker;

    /* ---- artykuły ---- */
    const main = document.getElementById('gazeta');
    const FALLBACK_IMG = 'data:image/svg+xml;utf8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500"><rect width="100%" height="100%" fill="#d8d2c2"/><text x="50%" y="50%" font-family="serif" font-size="40" fill="#55503f" text-anchor="middle">Grzyb Times</text></svg>');

    D.artykuly.forEach((a, i) => {
      const el = document.createElement('article');
      el.className = (i === 0 ? 'hero' : 'article') + ' reveal';
      el.dataset.kategoria = a.kategoria;
      const imgSrc = esc(a.obraz && a.obraz.url && !a.obraz.url.startsWith('data:') ? a.obraz.url : '');
      const img = `<figure><a href="${esc(a.zrodlo.url)}"><img src="${imgSrc || FALLBACK_IMG}" alt="${esc(a.obraz && a.obraz.alt || a.kategoria)}" loading="lazy" onerror="this.onerror=null;this.src='${FALLBACK_IMG}'"></a></figure>`;
      const stats = (a.kluczowe_liczby || []).map(s =>
        `<span class="stat"><span class="num">${esc(s.wartosc)}</span><span class="lbl">${esc(s.opis)}</span></span>`).join('');
      const paras = a.akapity.map((p, j) =>
        `<p class="${j === 0 ? 'lede' : ''}">${esc(p)}</p>`).join('');
      const body =
        `<span class="cat-label">${esc(a.kategoria)}</span>` +
        `<h${i === 0 ? 2 : 3}><a href="${esc(a.zrodlo.url)}">${esc(a.tytul)}</a></h${i === 0 ? 2 : 3}>` +
        `<span class="meta">Źródło: <a href="${esc(a.zrodlo.url)}">${esc(a.zrodlo.nazwa)}</a>${a.zrodlo.godzina ? ' · ' + esc(a.zrodlo.godzina) : ''}</span>` +
        (stats ? `<div class="stats">${stats}</div>` : '') +
        (a.wykres ? chart(a.wykres, i) : '') +
        (i === 0 ? `<div class="cols">${paras}</div>` : paras);

      el.innerHTML = i === 0 ? img + body : img + `<div class="article-content">${body}</div>`;
      main.appendChild(el);
      if (i === 0) main.appendChild(Object.assign(document.createElement('hr'), { className: 'divider' }));
    });

    /* ---- filtry kategorii ---- */
    const cats = ['Wszystkie', ...new Set(D.artykuly.map(a => a.kategoria))];
    const filtryEl = document.createElement('div');
    filtryEl.className = 'filtry';
    filtryEl.innerHTML = cats.map((c, i) =>
      `<button class="filtr${i === 0 ? ' active' : ''}" data-cat="${esc(c)}">${esc(c)}</button>`
    ).join('');
    main.before(filtryEl);
    filtryEl.addEventListener('click', e => {
      const btn = e.target.closest('.filtr');
      if (!btn) return;
      const cat = btn.dataset.cat;
      filtryEl.querySelectorAll('.filtr').forEach(b => b.classList.toggle('active', b === btn));
      main.querySelectorAll('article').forEach(art =>
        art.classList.toggle('hidden', cat !== 'Wszystkie' && art.dataset.kategoria !== cat));
      const divider = main.querySelector('.divider');
      if (divider) divider.classList.toggle('hidden',
        cat !== 'Wszystkie' && D.artykuly[0] && D.artykuly[0].kategoria !== cat);
    });

    /* ---- stopka ---- */
    const zrodla = [...new Set(D.artykuly.map(a => a.zrodlo.nazwa))].join(' · ');
    document.getElementById('stopka').textContent =
      `Źródła wydania: ${zrodla} — wygenerowano ${D.data_wydania}`;

    /* ---- animacje wejścia ---- */
    const io = new IntersectionObserver(es => es.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('in-view'); io.unobserve(e.target); }
    }), { threshold: .15 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    /* ---- pasek postępu ---- */
    addEventListener('scroll', () => {
      const h = document.documentElement;
      document.getElementById('progress').style.width =
        (h.scrollTop / (h.scrollHeight - h.clientHeight) * 100) + '%';
    }, { passive: true });

    /* ---- pomocnicze ---- */
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g,
        c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    /* ---- formatowanie liczb (PL: spacje tysięcy, przecinek dziesiętny) ---- */
    function fmt(v) {
      if (typeof v !== 'number' || !isFinite(v)) return String(v);
      const neg = v < 0; v = Math.abs(v);
      const int = Math.trunc(v);
      let ip = int.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
      let dp = Number.isInteger(v) ? '' : (Math.round((v - int) * 100) / 100).toString().slice(2);
      return (neg ? '−' : '') + ip + (dp ? ',' + dp : '');
    }

    /* ---- renderer wykresów (SVG, interaktywny, bez zależności) ---- */
    function chart(w, idx) {
      const W = 560, H = 200, P = { t: 16, r: 16, b: 30, l: 44 };
      const vals = w.wartosci, n = (vals || []).length;
      if (!n) return '';
      const labels = w.etykiety || [], unit = w.jednostka || '';
      const min = Math.min(...vals), max = Math.max(...vals), span = (max - min) || 1;
      const x = i => P.l + i * (W - P.l - P.r) / Math.max(n - 1, 1);
      const y = v => P.t + (1 - (v - min) / span) * (H - P.t - P.b);
      let inner = '';
      /* siatka + etykiety wartości na osi Y */
      for (let g = 0; g <= 3; g++) {
        const gy = P.t + g * (H - P.t - P.b) / 3;
        const gv = max - (g / 3) * span;
        inner += `<line class="grid" x1="${P.l}" y1="${gy}" x2="${W - P.r}" y2="${gy}"/>`;
        inner += `<text class="val-lbl" x="${P.l - 6}" y="${gy + 3}" text-anchor="end">${esc(fmt(gv) + unit)}</text>`;
      }
      const pts = [];
      if (w.typ === 'slupki') {
        const bw = (W - P.l - P.r) / n * .62;
        vals.forEach((v, i) => {
          const bx = P.l + i * (W - P.l - P.r) / n + ((W - P.l - P.r) / n - bw) / 2;
          inner += `<rect class="bar" x="${bx}" y="${y(v)}" width="${bw}" height="${H - P.b - y(v)}" rx="3" style="animation-delay:${i * 60}ms"/>`;
          pts.push({ x: +(bx + bw / 2).toFixed(1), y: +y(v).toFixed(1), v, l: labels[i] || '' });
        });
      } else {
        const d = vals.map((v, i) => `${x(i)},${y(v)}`).join(' L');
        inner += `<path class="area" d="M${x(0)},${H - P.b} L${d} L${x(n - 1)},${H - P.b} Z"/>`;
        inner += `<path class="line" d="M${d}"/>`;
        vals.forEach((v, i) => {
          inner += `<circle class="pt" cx="${x(i)}" cy="${y(v)}" r="3"/>`;
          pts.push({ x: +x(i).toFixed(1), y: +y(v).toFixed(1), v, l: labels[i] || '' });
        });
      }
      /* etykiety osi X */
      labels.forEach((lb, i) => {
        const step = Math.ceil(n / 8);
        if (i % step === 0 || i === n - 1) {
          const lx = w.typ === 'slupki' ? P.l + (i + .5) * (W - P.l - P.r) / n : x(i);
          inner += `<text class="axis-lbl" x="${lx}" y="${H - 8}" text-anchor="middle">${esc(lb)}</text>`;
        }
      });
      /* warstwa interaktywna */
      inner += `<line class="guide" x1="0" y1="${P.t}" x2="0" y2="${H - P.b}"/>`;
      inner += `<circle class="hl" cx="0" cy="0" r="4.5"/>`;
      inner += `<rect class="hit" x="${P.l}" y="${P.t}" width="${W - P.l - P.r}" height="${H - P.t - P.b}"/>`;
      const pj = JSON.stringify(pts).replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/</g, '&lt;');
      return `<div class="chart-box"><div class="chart-title">${esc(w.tytul || '')}</div>` +
             `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(w.tytul || 'wykres')}" ` +
             `data-points='${pj}' data-unit="${esc(unit)}" data-w="${W}" data-h="${H}">${inner}</svg>` +
             `<div class="chart-tip"></div></div>`;
    }

    /* ---- interaktywność wykresów (tooltip + punkt + prowadnica) ---- */
    function wireCharts() {
      document.querySelectorAll('.chart-box').forEach(box => {
        const svg = box.querySelector('svg'); if (!svg) return;
        let pts; try { pts = JSON.parse(svg.dataset.points || '[]'); } catch (e) { pts = []; }
        if (!pts.length) return;
        const unit = svg.dataset.unit || '', VBW = +svg.dataset.w, VBH = +svg.dataset.h;
        const tip = box.querySelector('.chart-tip');
        const guide = svg.querySelector('.guide'), hl = svg.querySelector('.hl');
        const nearest = clientX => {
          const r = svg.getBoundingClientRect();
          const sx = (clientX - r.left) / r.width * VBW;
          let best = pts[0], bd = Infinity;
          for (const p of pts) { const d = Math.abs(p.x - sx); if (d < bd) { bd = d; best = p; } }
          return best;
        };
        const show = p => {
          guide.setAttribute('x1', p.x); guide.setAttribute('x2', p.x); guide.style.opacity = .5;
          hl.setAttribute('cx', p.x); hl.setAttribute('cy', p.y); hl.style.opacity = 1;
          const r = svg.getBoundingClientRect(), br = box.getBoundingClientRect();
          tip.style.left = (r.left - br.left + p.x / VBW * r.width) + 'px';
          tip.style.top = (r.top - br.top + p.y / VBH * r.height) + 'px';
          tip.innerHTML = (p.l ? esc(p.l) + ' · ' : '') + `<b>${esc(fmt(p.v) + unit)}</b>`;
          tip.style.opacity = 1;
        };
        const hide = () => { guide.style.opacity = 0; hl.style.opacity = 0; tip.style.opacity = 0; };
        svg.addEventListener('mousemove', e => show(nearest(e.clientX)));
        svg.addEventListener('mouseleave', hide);
        svg.addEventListener('touchstart', e => show(nearest(e.touches[0].clientX)), { passive: true });
        svg.addEventListener('touchmove', e => show(nearest(e.touches[0].clientX)), { passive: true });
      });
    }
    wireCharts();
  })();
  </script>
</body>
